name: Supabase Daily Backup

on:
  schedule:
    # 每天 UTC 16:00 = 台北 00:00
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump schema + data
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: nqegeidvsflkwllnfink
        run: |
          mkdir -p backups
          DATE=$(date -u +%Y-%m-%d)
          supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db dump -f "backups/schema-$DATE.sql" --schema public
          supabase db dump -f "backups/data-$DATE.sql" --data-only --schema public
          gzip backups/*.sql
          ls -lh backups/

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backups/
          retention-days: 90
