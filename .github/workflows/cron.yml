name: moyu-academy cron jobs

# 17 cron schedule via GitHub Actions (Zeabur 免費 tier 無 builtin cron)
# 透過 curl 觸發 prod /api/cron/* endpoints
# Wave 2 接真資料前,大部分 cron 是 NOOP placeholder
#
# 環境設定:
#   GitHub repo Settings → Secrets → Actions:
#     CRON_SECRET = (Vincent set,跟 prod env CRON_SECRET 同值)
#     PROD_BASE_URL = https://moyusales.zeabur.app

on:
  schedule:
    # 台北時區是 UTC+8,GitHub Actions cron 用 UTC
    # 每 30 分(00, 30 of each hour)
    - cron: '*/30 * * * *'      # auto-iterate-30min
    # 每 15 分(metabase-sync)
    - cron: '*/15 * * * *'
    # 每日定時(UTC 換算為台北時間)
    - cron: '0 0 * * *'         # 台北 08:00 — daily-automation
    - cron: '0 1 * * *'         # 台北 09:00 — daily-briefing-push
    - cron: '0 1 * * 1-5'       # 台北 09:00 工作日 — daily-todo-push + rookie-training-push
    - cron: '0 10 * * *'        # 台北 18:00 — manager-care-push
    - cron: '0 1 * * 1'         # 週一 台北 09:00 — weekly-report
    # recruiter-briefing-push 已於 Phase A 補刀砍除(人資招募 104 全砍)
    - cron: '0 */2 * * *'       # 每 2 小時 — breakthrough-engine
    - cron: '0 */3 * * *'       # 每 3 小時 — system-health-3h + claude-autoscan
    - cron: '0 0 * * 0'         # 週日 台北 08:00 — update-articles
    - cron: '*/10 * * * *'      # 每 10 分 — line-inbound-dispatcher
    # 2026-04-30 加 3 個沒 schedule 的 cron
    - cron: '0 6 * * *'         # 台北 14:00 — auto-attention-push (下午掃描關懷)
    - cron: '30 1 * * 1-5'      # 工作日 台北 09:30 — sales-metrics-rules (規則引擎)
    # recruit-auto-outreach 已於 Phase A 補刀砍除(人資招募 104 全砍)
    # 2026-04-30 加 daily-employee-sync(自動把 metabase 新 email 加入 users 表)
    - cron: '30 0 * * *'        # 台北 08:30 — daily-employee-sync
    # 2026-04-30 加 daily-stamp-detect(下班後掃 first_action + streak_days 印章)
    - cron: '0 15 * * *'        # 台北 23:00 — daily-stamp-detect
    # 2026-04-30 第三輪 — F1 embedding refresh 每 30 分掃 stale chunks
    - cron: '*/30 * * * *'      # 已存在,共用 — embedding-refresh
    # 2026-04-30 第三輪 — N7 cron failure alert 每小時掃 fail rate 推 LINE
    - cron: '15 * * * *'        # 每小時 :15 — cron-failure-alert
    # 2026-04-30 末段 — auto-classify-pillar 週日 02:00 TPE = UTC 週六 18:00
    - cron: '0 18 * * 6'        # 週日 02:00 — auto-classify-pillar
    # 2026-05-02 Wave 6 — claude-daily-narrative 每天 06:00 TPE = UTC 22:00 前一天
    - cron: '0 22 * * *'        # 每天 22:00 UTC = 06:00 台北 — claude-daily-narrative
  workflow_dispatch:  # 允許 manual trigger

jobs:
  trigger-cron-endpoints:
    runs-on: ubuntu-latest
    steps:
      - name: Compute current UTC schedule
        id: schedule
        run: |
          echo "Current UTC: $(date -u)"
          echo "Triggered by: ${{ github.event.schedule || 'manual' }}"

      - name: Trigger cron endpoints
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: https://moyusales.zeabur.app
        run: |
          # Map schedule to endpoints (best-effort,multiple endpoints per schedule OK)
          SCHEDULE="${{ github.event.schedule }}"
          MANUAL=${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          echo "Schedule: $SCHEDULE / manual: $MANUAL"

          # Helper to curl an endpoint with auth (best-effort,fail OK for NOOP placeholders)
          call_cron() {
            local endpoint="$1"
            local url="${BASE_URL}/api/cron/${endpoint}"
            echo ">>> Trigger: $endpoint"
            curl -sS -X POST -H "Authorization: Bearer $CRON_SECRET" "$url" -m 60 || echo "(NOOP or unreachable: $endpoint)"
            echo ""
          }

          if [ "$SCHEDULE" = "*/30 * * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron auto-iterate-30min
          fi
          if [ "$SCHEDULE" = "*/15 * * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron metabase-sync
          fi
          if [ "$SCHEDULE" = "*/10 * * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron line-inbound-dispatcher
          fi
          if [ "$SCHEDULE" = "0 0 * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron daily-automation
          fi
          if [ "$SCHEDULE" = "0 1 * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron daily-briefing-push
          fi
          if [ "$SCHEDULE" = "0 1 * * 1-5" ] || [ "$MANUAL" = "true" ]; then
            call_cron daily-todo-push
            call_cron rookie-training-push
          fi
          if [ "$SCHEDULE" = "0 10 * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron manager-care-push
          fi
          if [ "$SCHEDULE" = "0 1 * * 1" ] || [ "$MANUAL" = "true" ]; then
            call_cron weekly-report
          fi
          # recruiter-briefing-push 已於 Phase A 補刀砍除(人資招募 104 全砍)
          if [ "$SCHEDULE" = "0 */2 * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron breakthrough-engine
          fi
          if [ "$SCHEDULE" = "0 */3 * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron system-health-3h
            call_cron claude-autoscan
          fi
          if [ "$SCHEDULE" = "0 0 * * 0" ] || [ "$MANUAL" = "true" ]; then
            call_cron update-articles
          fi
          # 法務 deadline 預警 — 每日 09:30 台北 = UTC 01:30
          if [ "$SCHEDULE" = "30 1 * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron legal-deadline-warning
          fi
          # 招募 sheet 同步 / lynn-template-judgment / auto-104-batch / phone-stats-sync
          # 已於 Phase A 補刀砍除(人資招募 104 全砍)
          # 突破引擎警報 — 每 2 hr(已加在 0 */2 * * * 上面)
          if [ "$SCHEDULE" = "0 */2 * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron breakthrough-alert
          fi

          # auto-attention-push — 台北 14:00 = UTC 06:00
          if [ "$SCHEDULE" = "0 6 * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron auto-attention-push
          fi
          # sales-metrics-rules — 工作日 09:30 TPE = UTC 01:30 weekday
          if [ "$SCHEDULE" = "30 1 * * 1-5" ] || [ "$MANUAL" = "true" ]; then
            call_cron sales-metrics-rules
          fi
          # recruit-auto-outreach 已於 Phase A 補刀砍除(人資招募 104 全砍)
          # daily-employee-sync — 每日 08:30 TPE = UTC 00:30
          if [ "$SCHEDULE" = "30 0 * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron daily-employee-sync
          fi
          # daily-stamp-detect — 每日 23:00 TPE = UTC 15:00 (下班後)
          if [ "$SCHEDULE" = "0 15 * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron daily-stamp-detect
          fi
          # 2026-04-30 第三輪 — embedding-refresh 共用 */30(stale chunk 自動重 embed)
          if [ "$SCHEDULE" = "*/30 * * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron embedding-refresh
          fi
          # 2026-04-30 第三輪 — cron-failure-alert 每小時 :15(連續 fail 推 LINE)
          if [ "$SCHEDULE" = "15 * * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron cron-failure-alert
          fi
          # 2026-04-30 末段 — auto-classify-pillar 週日 02:00 TPE = UTC 週六 18:00
          if [ "$SCHEDULE" = "0 18 * * 6" ] || [ "$MANUAL" = "true" ]; then
            call_cron auto-classify-pillar
          fi
          # claude-daily-narrative — 06:00 TPE = UTC 22:00 前一天
          if [ "$SCHEDULE" = "0 22 * * *" ] || [ "$MANUAL" = "true" ]; then
            call_cron claude-daily-narrative
          fi

          echo "Done."
