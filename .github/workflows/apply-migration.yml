name: Apply Supabase Migration

# 透過 supabase CLI 一次性 apply 任意 SQL file (workflow_dispatch only)
# 需要 secrets: SUPABASE_ACCESS_TOKEN + SUPABASE_DB_PASSWORD

on:
  workflow_dispatch:
    inputs:
      sql_file:
        description: 'SQL file path (relative to repo root)'
        required: true
        default: 'supabase-migration-FIX-users-columns.sql'

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply SQL via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: nqegeidvsflkwllnfink
          SQL_FILE: ${{ inputs.sql_file }}
        run: |
          set -e
          echo "Verifying SQL file exists: $SQL_FILE"
          ls -la "$SQL_FILE"
          echo "================================================"
          # Build JSON body using jq with raw SQL content
          BODY=$(jq -Rs '{ query: . }' < "$SQL_FILE")
          echo "Posting to Supabase Management API..."
          HTTP_RESPONSE=$(curl -sS -w "\n___HTTP_STATUS=%{http_code}___" \
            -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          STATUS=$(echo "$HTTP_RESPONSE" | sed -n 's/.*___HTTP_STATUS=\([0-9]*\)___/\1/p')
          BODY_RESPONSE=$(echo "$HTTP_RESPONSE" | sed 's/___HTTP_STATUS=.*___//')
          echo "HTTP Status: $STATUS"
          echo "Response: $BODY_RESPONSE"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "================================================"
            echo "SQL applied successfully."
          else
            echo "FAILED."
            exit 1
          fi
