name: RAG Bootstrap

# 一次性跑:
#   1. POST /api/admin/rag/ingest-local-training (掃 content/training/ .md/.txt -> knowledge_chunks)
#   2. POST /api/admin/rag/embed-pending (補 embedding 給沒做的 chunks)
#
# 之後可加 schedule 定期跑

on:
  workflow_dispatch:
    inputs:
      max_chunks:
        description: 'embed 一次最多 N chunks (default 200)'
        required: false
        default: '200'
  schedule:
    - cron: '0 4 * * *'  # UTC 04:00 = 台北 12:00 (午餐後 sync)

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Login admin + get cookie
        id: login
        env:
          BASE: https://moyusales.zeabur.app
        run: |
          set -e
          echo "=== admin login ==="
          curl -sS -c /tmp/cookies.txt -X POST "$BASE/api/admin/auth" \
            -H 'Content-Type: application/json' \
            -d '{"email":"vincent@xuemi.co","password":"0000"}' > /tmp/login.json
          STATUS=$(jq -r '.user.email // empty' /tmp/login.json)
          if [ -z "$STATUS" ]; then
            echo "::error::admin login failed"
            cat /tmp/login.json | head -c 300
            exit 1
          fi
          echo "Login OK: $STATUS"
          echo "Cookie file: $(wc -l < /tmp/cookies.txt) lines"

      - name: Ingest local training files
        env:
          BASE: https://moyusales.zeabur.app
        run: |
          set -e
          echo "=== ingest-local-training ==="
          RESP=$(curl -sS -b /tmp/cookies.txt -X POST "$BASE/api/admin/rag/ingest-local-training" \
            -H 'Content-Type: application/json' -d '{}')
          echo "$RESP" | head -c 500
          echo ""

      - name: Embed pending chunks
        env:
          BASE: https://moyusales.zeabur.app
          MAX_CHUNKS: ${{ github.event.inputs.max_chunks || '200' }}
        run: |
          set -e
          echo "=== embed-pending ==="
          RESP=$(curl -sS -b /tmp/cookies.txt -X POST "$BASE/api/admin/rag/embed-pending" \
            -H 'Content-Type: application/json' \
            -d "{\"max_chunks\": $MAX_CHUNKS, \"batch_size\": 50}")
          echo "$RESP" | head -c 500
          echo ""

      - name: Notion sync (skip if no token)
        env:
          BASE: https://moyusales.zeabur.app
        run: |
          echo "=== notion-sync (will skip if NOTION_INTEGRATION_TOKEN not set) ==="
          curl -sS -b /tmp/cookies.txt -X POST "$BASE/api/admin/rag/ingest-notion" \
            -H 'Content-Type: application/json' -d '{}' | head -c 500
          echo ""
