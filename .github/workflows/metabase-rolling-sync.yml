name: Metabase Q1381 Rolling Sync

# 每 15 min Mon-Sat 09:00-22:00 (台北時區) 抓 today + 補 yesterday
# UTC 換算:台北 -8h → cron 用 UTC 01:00-14:45 對應台北 09:00-22:45
on:
  schedule:
    - cron: "0,15,30,45 1-14 * * 1-6"
  workflow_dispatch: {}  # 手動 trigger 用

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger rolling-sync endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret 沒設,workflow 跑不了"
            echo "Vincent 自己加:GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: CRON_SECRET   Value: 從 Zeabur env 複製"
            exit 1
          fi
          response=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            "https://moyusales.zeabur.app/api/cron/metabase-q1381-rolling-sync" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 60)
          http_code=$(echo "$response" | tail -1 | sed 's/HTTP_CODE://')
          body=$(echo "$response" | sed '$d')
          echo "HTTP $http_code"
          echo "$body" | head -c 2000
          if [ "$http_code" != "200" ]; then
            echo "::error::Endpoint returned $http_code"
            exit 1
          fi
