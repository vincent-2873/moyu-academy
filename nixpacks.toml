# Zeabur build config
# 加 system ffmpeg 進 container 讓 /api/admin/rag/whisper-upload/finalize
# 處理大檔 + 影片(extract audio + 切片)
#
# 雙保險:
#   nixPkgs(nixpacks 主流 — Zeabur nix base 抓得到)
#   aptPkgs(若 Zeabur fallback 到 ubuntu base 也 cover)

[phases.setup]
nixPkgs = ["nodejs_20", "ffmpeg"]
aptPkgs = ["ffmpeg"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start"
