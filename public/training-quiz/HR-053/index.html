<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR-053 業務敘薪制度 · 互動測驗</title>
<style>
  :root {
    --navy: #1E3A5F;
    --navy-deep: #152a44;
    --amber: #F59E0B;
    --amber-soft: #FEF3C7;
    --green: #10B981;
    --red: #EF4444;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-300: #D1D5DB;
    --gray-500: #6B7280;
    --gray-700: #374151;
    --gray-900: #111827;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4ecf7 100%);
    color: var(--gray-900);
    min-height: 100vh;
    padding: 24px 16px;
    line-height: 1.7;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
  }
  .header {
    background: var(--navy);
    color: white;
    padding: 32px 28px;
    border-radius: 16px 16px 0 0;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: "";
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(245,158,11,0.2), transparent 70%);
    border-radius: 50%;
  }
  .tag { font-size: 12px; letter-spacing: 2px; color: var(--amber); font-weight: 600; }
  .title { font-size: 26px; font-weight: 700; margin-top: 8px; }
  .subtitle { font-size: 14px; opacity: 0.75; margin-top: 6px; }

  .progress-bar {
    background: var(--gray-100);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--gray-300);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--amber);
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 13px;
    color: var(--gray-700);
    font-weight: 600;
    white-space: nowrap;
  }

  .card {
    background: white;
    padding: 36px 28px;
    border-radius: 0 0 16px 16px;
    box-shadow: 0 4px 24px rgba(30,58,95,0.08);
  }

  .q-num {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    color: var(--amber);
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 18px;
    font-weight: 600;
    color: var(--navy-deep);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .q-scene {
    background: var(--amber-soft);
    padding: 14px 16px;
    border-left: 3px solid var(--amber);
    border-radius: 0 8px 8px 0;
    margin-top: 14px;
    margin-bottom: 24px;
    font-size: 15px;
    color: var(--gray-700);
  }
  .q-scene strong { color: var(--navy-deep); }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    padding: 16px 18px;
    border: 2px solid var(--gray-300);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    color: var(--gray-700);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: white;
    text-align: left;
    font-family: inherit;
    width: 100%;
  }
  .opt:hover:not(:disabled) { border-color: var(--amber); background: #fffbeb; }
  .opt:disabled { cursor: not-allowed; opacity: 0.9; }
  .opt-letter {
    flex-shrink: 0;
    width: 26px; height: 26px;
    background: var(--gray-100);
    color: var(--gray-700);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  .opt.correct {
    border-color: var(--green);
    background: #ecfdf5;
    color: var(--gray-900);
  }
  .opt.correct .opt-letter { background: var(--green); color: white; }
  .opt.wrong {
    border-color: var(--red);
    background: #fef2f2;
    color: var(--gray-900);
  }
  .opt.wrong .opt-letter { background: var(--red); color: white; }

  .feedback {
    margin-top: 20px;
    padding: 18px 20px;
    border-radius: 10px;
    font-size: 14.5px;
    line-height: 1.7;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .feedback.show { display: block; }
  .feedback.right {
    background: #ecfdf5;
    border-left: 4px solid var(--green);
    color: var(--gray-900);
  }
  .feedback.miss {
    background: #fef2f2;
    border-left: 4px solid var(--red);
    color: var(--gray-900);
  }
  .feedback-title { font-weight: 700; margin-bottom: 6px; font-size: 15px; }
  .feedback-tip {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed rgba(0,0,0,0.15);
    font-size: 13.5px;
    color: var(--gray-700);
  }

  .nav {
    margin-top: 26px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .btn {
    padding: 12px 26px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--navy);
    color: white;
    margin-left: auto;
  }
  .btn-primary:hover:not(:disabled) { background: var(--navy-deep); }
  .btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    color: var(--gray-500);
  }
  .btn-ghost:hover { color: var(--navy); }

  .final {
    text-align: center;
    padding: 40px 24px;
  }
  .final-score {
    font-size: 72px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
    margin: 20px 0 8px;
  }
  .final-score .suffix { font-size: 28px; color: var(--gray-500); font-weight: 500; }
  .final-label { font-size: 14px; color: var(--gray-500); letter-spacing: 2px; }
  .final-msg {
    font-size: 18px;
    color: var(--gray-700);
    margin: 20px 0 28px;
    line-height: 1.6;
  }
  .summary {
    background: var(--gray-50);
    border-radius: 10px;
    padding: 20px;
    text-align: left;
    margin: 20px 0;
  }
  .summary h4 { font-size: 14px; color: var(--navy); margin-bottom: 10px; letter-spacing: 1px; }
  .summary-item { display: flex; gap: 10px; padding: 6px 0; font-size: 14px; align-items: flex-start; }
  .summary-item .icon { flex-shrink: 0; }

  .complete-badge {
    display: inline-block;
    background: var(--green);
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .header { padding: 24px 20px; }
    .card { padding: 28px 20px; }
    .title { font-size: 22px; }
    .q-text { font-size: 16px; }
    .final-score { font-size: 56px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="header">
    <div class="tag">HRBP 招募訓練 · EP1 / 4</div>
    <div class="title">業務敘薪制度 · 情境測驗</div>
    <div class="subtitle">8 題 · 答對 6 題以上通過</div>
  </div>

  <div class="progress-bar">
    <div class="progress-track"><div class="progress-fill" id="bar"></div></div>
    <div class="progress-text" id="progressText">第 1 / 8 題</div>
  </div>

  <div class="card" id="card">
    <!-- 動態載入內容 -->
  </div>

</div>

<script>
// 題庫：每題含情境、選項、正確答案、解析、對應影片段落
const quiz = [
  {
    num: "Q1",
    text: "求職者問『我可以領多少？』,最該避免的回答方式是？",
    scene: "情境：你接通電話,對方是看 104 投遞履歷的求職者,一開口就問薪水。",
    options: [
      "給範圍 + 實拿金額（例:底薪 3 萬 + 抽成 + 活動獎金合計 4-5 萬）",
      "直接報抽成百分比(例:我們抽 6% 到 15%)",
      "先反問求職者的期待再給數字",
      "講三星制度的三個來源"
    ],
    correct: 1,
    right: "正解!直接報％會讓求職者腦中卡住算不出來,反而覺得你在推銷。",
    tip: "話術口袋:講『三個數字』—— 底薪多少、抽成多少、活動獎金多少、合計多少。讓求職者感覺『我可以帶這個數字回家』。"
  },
  {
    num: "Q2",
    text: "新人業務第一個月平均實拿薪資是多少?",
    scene: "情境:求職者問『那新人第一個月大概能拿多少?我有房租壓力』。",
    options: [
      "3 萬(就是底薪)",
      "4-5 萬",
      "6-8 萬",
      "視業績而定,沒有固定"
    ],
    correct: 1,
    right: "正解!新人第一個月實拿 4-5 萬。",
    tip: "拆解:底薪 3 萬 + 活動獎金 6,000-8,000(新人訓練期間就能領)+ 初期抽成。這個數字要背到像電話號碼。"
  },
  {
    num: "Q3",
    text: "下列哪一個是『三星制度』的正確組合?",
    scene: "情境:求職者問『你們的薪水是怎麼算的?』",
    options: [
      "底薪 + 年終 + 分紅",
      "底薪 + 績效抽成(含目標獎金)+ 活動獎金",
      "底薪 + 抽成 + 加班費",
      "固定薪 + 季獎金 + 全勤"
    ],
    correct: 1,
    right: "正解!底薪 / 績效抽成(含目標獎金)/ 活動獎金 —— 三星。",
    tip: "記憶法:薪水的三個『來源』而不是『計算方式』。這樣講聽起來很穩,不像在算數學。"
  },
  {
    num: "Q4",
    text: "業務自己跟主管討論訂下目標 30 萬,結果當月做到 60 萬。目標獎金領多少?",
    scene: "情境:求職者問『那目標獎金是超越越多領越多嗎?』",
    options: [
      "2,000(超標雙倍獎勵)",
      "1,000(達標就是 1,000,不因超標加倍)",
      "3,000(60 萬算高標)",
      "要看主管裁量"
    ],
    correct: 1,
    right: "正解!目標獎金的設計是『達標固定 1,000』,核心不是絕對值。",
    tip: "為什麼這樣設計?這是『自我承諾』的訓練,讓業務學會說到做到。講給求職者聽時,強調這是文化不是計算題。"
  },
  {
    num: "Q5",
    text: "主任某個月業績掛蛋(0 元),會被降到哪個階級?",
    scene: "情境:求職者問『那業績不好會不會被 fire?』,這題你要答得讓他安心。",
    options: [
      "新人(打回原點)",
      "專員(只降一階)",
      "不會降,會再觀察一個月",
      "直接離職"
    ],
    correct: 1,
    right: "正解!階梯式降級,一次只降一階。",
    tip: "這題是求職者『安全感話術』的核心。記得強調:我們是階梯式降級,不會一次打回新人,這是公司給業務的犯錯緩衝空間。"
  },
  {
    num: "Q6",
    text: "下列哪個屬於『財金(nSchool)』業務的特色制度?",
    scene: "情境:今天招募的是 nSchool 的職缺,你要特別說明。",
    options: [
      "新人沒底薪",
      "正式以上改成『擇優領』(底薪 vs 抽成哪個高領哪個)",
      "沒有活動獎金",
      "跟職能完全一樣的三星制度"
    ],
    correct: 1,
    right: "正解!財金正式後是擇優領,這是跟職能最大的差異。",
    tip: "注意:35 萬業績是交叉點 —— 35 萬以下領底薪 3 萬,35 萬以上領抽成。招募財金業務一定要說清楚,否則入職後會炸鍋。"
  },
  {
    num: "Q7",
    text: "襄理的責任條件是下列哪一個?",
    scene: "情境:求職者問『做多久可以當主管?要做到什麼程度?』",
    options: [
      "兩個月平均訂單 40 萬",
      "兩個月平均訂單 60 萬",
      "兩個月平均訂單 90 萬,且月不低於 75 萬",
      "累計破 500 萬"
    ],
    correct: 2,
    right: "正解!兩個月平均 90 萬,任一月低於 75 萬會降回主任。",
    tip: "襄理平均月薪 10-20 萬不是吹牛 —— 75 萬業績抽成已達 12%,算出來就是這個數字。背好這套推導,回答起來才有說服力。"
  },
  {
    num: "Q8",
    text: "求職者是個剛離開保險業、想轉職但擔心『不穩定』的人。下列哪個話術最能打動他?",
    scene: "情境:對方語氣猶豫,提到前一份保險業沒底薪很累。",
    options: [
      "我們底薪 3 萬,不會讓你餓死",
      "我們是三星制度 —— 底薪 3 萬保底、績效抽成有天花板可以突破、加上每月活動獎金,新人第一個月平均可以帶 4-5 萬回家,穩定又有上限",
      "你要做業務就要能接受不穩定",
      "先進來試試,不行再換"
    ],
    correct: 1,
    right: "正解!三星制度結構完整、有數字、講到『帶回家』感受。",
    tip: "這就是完整話術的示範:結構(三星) + 數字(4-5 萬) + 情感(帶回家)。背下這個模板,95% 的求職者會願意繼續聊。"
  }
];

let current = 0;
let answers = [];

const card = document.getElementById('card');
const bar = document.getElementById('bar');
const progressText = document.getElementById('progressText');

function updateProgress() {
  const pct = ((current) / quiz.length) * 100;
  bar.style.width = pct + '%';
  progressText.textContent = `第 ${Math.min(current + 1, quiz.length)} / ${quiz.length} 題`;
}

function renderQuestion() {
  updateProgress();
  const q = quiz[current];
  card.innerHTML = `
    <div class="q-num">${q.num}</div>
    <div class="q-text">${q.text}</div>
    <div class="q-scene"><strong>📞 ${q.scene.split(':')[0]}:</strong>${q.scene.split(':').slice(1).join(':')}</div>
    <div class="options" id="opts">
      ${q.options.map((opt, i) => `
        <button class="opt" data-idx="${i}">
          <span class="opt-letter">${String.fromCharCode(65 + i)}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="nav">
      <button class="btn btn-primary" id="next" disabled>${current === quiz.length - 1 ? '看結果' : '下一題 →'}</button>
    </div>
  `;

  const opts = card.querySelectorAll('.opt');
  opts.forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      handleAnswer(idx, opts);
    });
  });

  document.getElementById('next').addEventListener('click', nextQuestion);
}

function handleAnswer(idx, opts) {
  const q = quiz[current];
  const isRight = idx === q.correct;
  answers.push({ q: current, picked: idx, correct: isRight });

  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isRight ? 'right' : 'miss');
  fb.innerHTML = `
    <div class="feedback-title">${isRight ? '✓ ' + q.right : '✗ 再想想:' + q.right}</div>
    <div class="feedback-tip">💡 <strong>話術口袋:</strong>${q.tip}</div>
  `;

  document.getElementById('next').disabled = false;
}

function nextQuestion() {
  current++;
  if (current >= quiz.length) {
    renderResult();
  } else {
    renderQuestion();
  }
}

function renderResult() {
  bar.style.width = '100%';
  progressText.textContent = '完成';

  const rightCount = answers.filter(a => a.correct).length;
  const pct = Math.round((rightCount / quiz.length) * 100);
  const passed = rightCount >= 6;

  const msg = passed
    ? (rightCount === 8 ? '完美!你已經完整掌握業務敘薪制度,可以接一面任務了。' :
       rightCount === 7 ? '很穩!只錯一題,話術口袋已經建立,實戰可以上線。' :
       '過關!基礎掌握 OK,建議把答錯的題目回去複習一次。')
    : '還沒過關。請回去看一次影片,特別是【三星制度】和【敘薪話術】兩段。';

  const wrongTopics = answers.filter(a => !a.correct).map(a => {
    const qNum = a.q + 1;
    const topics = {
      1: "敘薪話術原則",
      2: "新人實拿薪資",
      3: "三星制度結構",
      4: "目標獎金邏輯",
      5: "階梯式降級",
      6: "財金擇優領",
      7: "襄理責任條件",
      8: "完整話術運用"
    };
    return `<div class="summary-item"><span class="icon">⚠️</span><span>Q${qNum} ${topics[qNum]}</span></div>`;
  }).join('');

  card.innerHTML = `
    <div class="final">
      ${passed ? '<div class="complete-badge">✓ 單元完成</div>' : ''}
      <div class="final-label">ANSWERED CORRECTLY</div>
      <div class="final-score">${rightCount}<span class="suffix"> / 8</span></div>
      <div class="final-msg">${msg}</div>

      ${wrongTopics ? `
        <div class="summary">
          <h4>建議複習這些主題</h4>
          ${wrongTopics}
        </div>
      ` : ''}

      <div style="margin-top: 30px; padding-top: 24px; border-top: 1px solid var(--gray-100);">
        <div style="font-size: 13px; color: var(--gray-500); letter-spacing: 1px; margin-bottom: 12px;">NEXT UP</div>
        <div style="font-size: 16px; color: var(--navy); font-weight: 600;">EP2 一面 vs 二面:面試的任務分工</div>
      </div>

      <button class="btn btn-ghost" onclick="restart()" style="margin-top: 24px;">↻ 重新測驗</button>
    </div>
  `;

  // 通知平台完成(若有整合)
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({
      type: 'unit_complete',
      unit: 'HR-053',
      score: rightCount,
      total: quiz.length,
      passed: passed
    }, '*');
  }
}

function restart() {
  current = 0;
  answers = [];
  renderQuestion();
}

// 初始化
renderQuestion();
</script>

</body>
</html>
