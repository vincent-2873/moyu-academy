<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR-055 三階段回覆法 · 互動測驗</title>
<style>
  :root {
    --navy: #1E3A5F; --navy-deep: #152a44;
    --amber: #F59E0B; --amber-soft: #FEF3C7;
    --green: #10B981; --red: #EF4444;
    --gray-50: #F9FAFB; --gray-100: #F3F4F6;
    --gray-300: #D1D5DB; --gray-500: #6B7280;
    --gray-700: #374151; --gray-900: #111827;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4ecf7 100%);
    color: var(--gray-900); min-height: 100vh;
    padding: 24px 16px; line-height: 1.7;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  .header {
    background: var(--navy); color: white;
    padding: 32px 28px; border-radius: 16px 16px 0 0;
    position: relative; overflow: hidden;
  }
  .header::before {
    content: ""; position: absolute;
    top: -40px; right: -40px; width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(245,158,11,0.2), transparent 70%);
    border-radius: 50%;
  }
  .tag { font-size: 12px; letter-spacing: 2px; color: var(--amber); font-weight: 600; }
  .title { font-size: 26px; font-weight: 700; margin-top: 8px; }
  .subtitle { font-size: 14px; opacity: 0.75; margin-top: 6px; }
  .progress-bar { background: var(--gray-100); padding: 14px 28px; display: flex; align-items: center; gap: 14px; }
  .progress-track { flex: 1; height: 6px; background: var(--gray-300); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--amber); width: 0%; transition: width 0.4s ease; }
  .progress-text { font-size: 13px; color: var(--gray-700); font-weight: 600; white-space: nowrap; }
  .card { background: white; padding: 36px 28px; border-radius: 0 0 16px 16px; box-shadow: 0 4px 24px rgba(30,58,95,0.08); }
  .q-num { display: inline-block; font-size: 12px; font-weight: 700; color: var(--amber); letter-spacing: 1.5px; margin-bottom: 8px; }
  .q-text { font-size: 18px; font-weight: 600; color: var(--navy-deep); margin-bottom: 8px; line-height: 1.5; }
  .q-scene {
    background: var(--amber-soft); padding: 14px 16px;
    border-left: 3px solid var(--amber); border-radius: 0 8px 8px 0;
    margin-top: 14px; margin-bottom: 24px;
    font-size: 15px; color: var(--gray-700);
  }
  .q-scene strong { color: var(--navy-deep); }
  .q-dialogue {
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 16px; margin: 14px 0 20px 0; font-size: 14.5px;
  }
  .q-dialogue .line { margin-bottom: 8px; }
  .q-dialogue .who { font-weight: 700; color: var(--navy); font-size: 13px; letter-spacing: 0.5px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    padding: 16px 18px; border: 2px solid var(--gray-300);
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
    font-size: 15px; color: var(--gray-700);
    display: flex; align-items: flex-start; gap: 12px;
    background: white; text-align: left; font-family: inherit; width: 100%;
  }
  .opt:hover:not(:disabled) { border-color: var(--amber); background: #fffbeb; }
  .opt:disabled { cursor: not-allowed; opacity: 0.9; }
  .opt-letter {
    flex-shrink: 0; width: 26px; height: 26px;
    background: var(--gray-100); color: var(--gray-700);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  .opt.correct { border-color: var(--green); background: #ecfdf5; color: var(--gray-900); }
  .opt.correct .opt-letter { background: var(--green); color: white; }
  .opt.wrong { border-color: var(--red); background: #fef2f2; color: var(--gray-900); }
  .opt.wrong .opt-letter { background: var(--red); color: white; }
  .feedback { margin-top: 20px; padding: 18px 20px; border-radius: 10px; font-size: 14.5px; line-height: 1.7; display: none; animation: fadeIn 0.3s ease; }
  .feedback.show { display: block; }
  .feedback.right { background: #ecfdf5; border-left: 4px solid var(--green); color: var(--gray-900); }
  .feedback.miss { background: #fef2f2; border-left: 4px solid var(--red); color: var(--gray-900); }
  .feedback-title { font-weight: 700; margin-bottom: 6px; font-size: 15px; }
  .feedback-tip { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(0,0,0,0.15); font-size: 13.5px; color: var(--gray-700); }
  .nav { margin-top: 26px; display: flex; justify-content: space-between; gap: 12px; }
  .btn { padding: 12px 26px; border-radius: 8px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .btn-primary { background: var(--navy); color: white; margin-left: auto; }
  .btn-primary:hover:not(:disabled) { background: var(--navy-deep); }
  .btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--gray-500); }
  .btn-ghost:hover { color: var(--navy); }
  .final { text-align: center; padding: 40px 24px; }
  .final-score { font-size: 72px; font-weight: 700; color: var(--navy); line-height: 1; margin: 20px 0 8px; }
  .final-score .suffix { font-size: 28px; color: var(--gray-500); font-weight: 500; }
  .final-label { font-size: 14px; color: var(--gray-500); letter-spacing: 2px; }
  .final-msg { font-size: 18px; color: var(--gray-700); margin: 20px 0 28px; line-height: 1.6; }
  .summary { background: var(--gray-50); border-radius: 10px; padding: 20px; text-align: left; margin: 20px 0; }
  .summary h4 { font-size: 14px; color: var(--navy); margin-bottom: 10px; letter-spacing: 1px; }
  .summary-item { display: flex; gap: 10px; padding: 6px 0; font-size: 14px; align-items: flex-start; }
  .complete-badge { display: inline-block; background: var(--green); color: white; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; letter-spacing: 1px; margin-bottom: 16px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 480px) { .header { padding: 24px 20px; } .card { padding: 28px 20px; } .title { font-size: 22px; } .q-text { font-size: 16px; } .final-score { font-size: 56px; } }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="tag">HRBP 招募訓練 · EP3 / 4</div>
    <div class="title">三階段回覆法 · 情境測驗</div>
    <div class="subtitle">8 題 · 答對 6 題以上通過</div>
  </div>
  <div class="progress-bar">
    <div class="progress-track"><div class="progress-fill" id="bar"></div></div>
    <div class="progress-text" id="progressText">第 1 / 8 題</div>
  </div>
  <div class="card" id="card"></div>
</div>

<script>
const quiz = [
  {
    num: "Q1",
    text: "三階段回覆法的正確順序是?",
    scene: "情境:你正在跟求職者通電話,準備回答他的問題。",
    options: [
      "反問 → 標準 → 延伸",
      "標準 → 延伸 → 反問",
      "延伸 → 反問 → 標準",
      "標準 → 反問 → 延伸"
    ],
    correct: 1,
    right: "正解!標準 → 延伸 → 反問。",
    tip: "記憶法:先給事實(標準),再加例子(延伸),最後丟球回去(反問)。這三階段缺一不可,尤其是反問 —— 90% 的新人會漏掉最後這步。"
  },
  {
    num: "Q2",
    text: "求職者問:『你們團隊氛圍怎麼樣?』下列哪個是好的第一階段『標準回覆』?",
    scene: "情境:這是最常見的致命提問之一,你要答得好才能繼續對話。",
    options: [
      "我們團隊很好啊,大家都很 nice",
      "你自己覺得團隊氛圍應該怎樣?",
      "我們不是壓迫型團隊,節奏快、大家會互相幫忙。業績壓力會有,但是有節奏地推,不會是被罵的那種",
      "比起保險業,我們算超和諧的"
    ],
    correct: 2,
    right: "正解!這是 Vincent 示範的標準回覆,用事實而不是形容詞。",
    tip: "比較:『很好啊』是形容詞,『不會被罵、會互相幫忙』是事實。**事實才有說服力**。形容詞 vs 事實的分辨,是專業度的指標。"
  },
  {
    num: "Q3",
    text: "Vincent 說『有比較就會有傷害』。在第二階段『延伸』時最常用的對比手法是?",
    scene: "情境:你已經講完標準回覆,要加強說服力。",
    options: [
      "跟求職者前一份工作比較",
      "用市場上『傳統業務 / 無制度化的團隊』當對比,襯托我們的教育訓練",
      "跟其他求職者比較",
      "跟主管人品比較"
    ],
    correct: 1,
    right: "正解!用市場通例當對比,凸顯我們的差異化。",
    tip: "公式:『市場上很多業務是丟你自己撞 → 我們有固定課綱 → 帶得走的東西』。這招激發求職者『天啊原來大部分都沒有』的驚訝感,比單講優點強十倍。"
  },
  {
    num: "Q4",
    text: "下列哪個反問『不是』好的反問?",
    scene: "情境:你要結束一輪話題,準備讓求職者說話。",
    options: [
      "那你覺得呢?",
      "你之前待的團隊氛圍是怎樣的?",
      "聽完這段,你有什麼疑問?",
      "那你還有想問的嗎?"
    ],
    correct: 3,
    right: "正解!『你還有想問的嗎?』很容易讓對話 dead end。",
    tip: "Lynn 點過這點:這類問題變成『作死題』。如果求職者回『沒有』,整個對話就卡了。改成『你剛剛有提到 XX,我想多聊一下』才是好的丟球。"
  },
  {
    num: "Q5",
    text: "肌肉記憶四階段是?",
    scene: "情境:你問自己『我現在在哪一階?』",
    options: [
      "聽過 → 記住 → 背起來 → 能重複",
      "知道 → 做到 → 做好 → 精通",
      "新手 → 熟手 → 老手 → 高手",
      "學 → 練 → 用 → 教"
    ],
    correct: 1,
    right: "正解!知道 → 做到 → 做好 → 精通。",
    tip: "Vincent 說的這四階段定義很清楚:『知道』= 看過記得,『做到』= 照做符合標準,『做好』= 自然有彈性,『精通』= 有自己版本能教別人。沒有人一開始就精通。"
  },
  {
    num: "Q6",
    text: "Lynn 給的兩個專業度建議是下列哪兩個?(選最符合的)",
    scene: "情境:你聽完自己的電訪錄音檔,發現需要調整的地方。",
    options: [
      "聲音要大 + 語速要快",
      "固定名詞要熟練 + 段落之間留 1-2 秒停頓",
      "要講得像朋友 + 要夠熱情",
      "抓重點講 + 少廢話"
    ],
    correct: 1,
    right: "正解!這兩點是 Lynn 的專業度指標。",
    tip: "固定名詞(『墨凡股份有限公司』『電話銷售』『課程行銷顧問』)念卡會掉專業感。停頓讓你自己緩一下、讓求職者消化,不會顯得急促。"
  },
  {
    num: "Q7",
    text: "求職者在電話上說:『我覺得業務壓力好像蠻大的我再想想』。下列哪個回應最符合三階段心法?",
    scene: "情境:對方明顯有點退縮,你不想硬推但也不想放棄。",
    options: [
      "沒關係,你再想想,等你決定",
      "業務本來就有壓力,你再考慮要不要做",
      "業務壓力確實會有(標準),但我們有完整教育訓練和學長姊帶(延伸)。你是比較擔心第一個月撐不下去,還是長期壓力?(反問)",
      "你不是要賺錢嗎?做業務才能賺錢啊"
    ],
    correct: 2,
    right: "正解!這是完整的三階段示範:承認事實 → 加上支持 → 反問釐清。",
    tip: "關鍵在最後的反問:『是擔心第一個月還是長期?』讓你精準判斷他的真實顧慮,下一句才能對症下藥。這就是**反問蒐集情報**的價值。"
  },
  {
    num: "Q8",
    text: "對於『被求職者拒絕』,下列哪個心態最健康?",
    scene: "情境:你剛被一個看起來不錯的求職者拒絕,心情有點低落。",
    options: [
      "一定是我哪裡講錯話了,要檢討自己",
      "他不懂這份工作的好,是他的損失",
      "雙向選擇很正常,他不是拒絕我,是我們不合適。每次拒絕都在校正我的判讀能力",
      "下次不要再打給他這種人"
    ],
    correct: 2,
    right: "正解!Vincent 強調的心態 —— 拒絕是資料點,不是否定。",
    tip: "把拒絕當成資料:他為什麼拒絕?是薪水、通勤、還是怕壓力?每個答案都讓你下次更準。這是**心理衛生**,也是能在招募這行做久的關鍵。"
  }
];

let current = 0; let answers = [];
const card = document.getElementById('card');
const bar = document.getElementById('bar');
const progressText = document.getElementById('progressText');

function updateProgress() {
  const pct = ((current) / quiz.length) * 100;
  bar.style.width = pct + '%';
  progressText.textContent = `第 ${Math.min(current + 1, quiz.length)} / ${quiz.length} 題`;
}

function renderQuestion() {
  updateProgress();
  const q = quiz[current];
  card.innerHTML = `
    <div class="q-num">${q.num}</div>
    <div class="q-text">${q.text}</div>
    <div class="q-scene"><strong>📞 ${q.scene.split(':')[0]}:</strong>${q.scene.split(':').slice(1).join(':')}</div>
    <div class="options" id="opts">
      ${q.options.map((opt, i) => `
        <button class="opt" data-idx="${i}">
          <span class="opt-letter">${String.fromCharCode(65 + i)}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="nav">
      <button class="btn btn-primary" id="next" disabled>${current === quiz.length - 1 ? '看結果' : '下一題 →'}</button>
    </div>
  `;
  const opts = card.querySelectorAll('.opt');
  opts.forEach(btn => btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx), opts)));
  document.getElementById('next').addEventListener('click', nextQuestion);
}

function handleAnswer(idx, opts) {
  const q = quiz[current];
  const isRight = idx === q.correct;
  answers.push({ q: current, picked: idx, correct: isRight });
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isRight ? 'right' : 'miss');
  fb.innerHTML = `
    <div class="feedback-title">${isRight ? '✓ ' + q.right : '✗ 再想想:' + q.right}</div>
    <div class="feedback-tip">💡 <strong>心法口袋:</strong>${q.tip}</div>
  `;
  document.getElementById('next').disabled = false;
}

function nextQuestion() {
  current++;
  if (current >= quiz.length) renderResult();
  else renderQuestion();
}

function renderResult() {
  bar.style.width = '100%';
  progressText.textContent = '完成';
  const rightCount = answers.filter(a => a.correct).length;
  const passed = rightCount >= 6;
  const msg = passed
    ? (rightCount === 8 ? '完美!你已經內化三階段回覆法,可以進到 EP4 面對致命提問。' :
       rightCount === 7 ? '很穩!心法已經在你的肌肉裡。' :
       '過關!繼續練習,讓這套心法變成你的反射動作。')
    : '還沒過關。這集是心法核心,請回去重看特別是【三階段結構】和【反問金句】。';

  const topics = {
    1: "三階段順序",
    2: "標準回覆品質",
    3: "延伸對比手法",
    4: "反問陷阱題",
    5: "肌肉記憶階段",
    6: "專業度細節",
    7: "完整三階段運用",
    8: "拒絕心態"
  };
  const wrongTopics = answers.filter(a => !a.correct).map(a => 
    `<div class="summary-item"><span class="icon">⚠️</span><span>Q${a.q + 1} ${topics[a.q + 1]}</span></div>`
  ).join('');

  card.innerHTML = `
    <div class="final">
      ${passed ? '<div class="complete-badge">✓ 單元完成</div>' : ''}
      <div class="final-label">ANSWERED CORRECTLY</div>
      <div class="final-score">${rightCount}<span class="suffix"> / 8</span></div>
      <div class="final-msg">${msg}</div>
      ${wrongTopics ? `<div class="summary"><h4>建議複習這些主題</h4>${wrongTopics}</div>` : ''}
      <div style="margin-top: 30px; padding-top: 24px; border-top: 1px solid var(--gray-100);">
        <div style="font-size: 13px; color: var(--gray-500); letter-spacing: 1px; margin-bottom: 12px;">NEXT UP</div>
        <div style="font-size: 16px; color: var(--navy); font-weight: 600;">EP4 致命提問應對 · 業績壓力/團隊氛圍</div>
      </div>
      <button class="btn btn-ghost" onclick="restart()" style="margin-top: 24px;">↻ 重新測驗</button>
    </div>
  `;
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({
      type: 'unit_complete',
      unit: 'HR-055',
      score: rightCount,
      total: quiz.length,
      passed: passed
    }, '*');
  }
}

function restart() { current = 0; answers = []; renderQuestion(); }
renderQuestion();
</script>

</body>
</html>
